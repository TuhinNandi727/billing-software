{% extends 'base.html' %}
{% block content %}

  <h2>Create Invoice</h2>
  <form method="POST">
    {% csrf_token %}  
    
    <label>Select Customer</label>
    {{form.customer}}
    <br><br>
    <h3>Products</h3>
    <table border="1">
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
      </tr>
      {% for product in products %}
      <tr>
        <td>{{product.name}}</td>
        <td>{{product.price}}</td>
        <td>
          <input type="number" name="quantity_{{product.id}}" value="0"> 
        </td>
      </tr>
      {% endfor %}
    </table>
    <br>
    <button type="submit">Generate Invoice</button>
  </form>
{% endblock %}
