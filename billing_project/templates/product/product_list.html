{% extends 'base.html' %}
{% block content %}

<h2>Product List</h2>
<a href="/add-product/">Add New Product</a>
<table border="1">
  <tr>
    <th>Name</th>
    <th>Code</th>
    <th>Category</th>
    <th>Price</th>
    <th>Quantity</th>
    <!-- <th>tax</th> -->
  </tr>
  {% for product in products %}
  <tr>
    <td>{{product.name}}</td>
    <td>{{product.code}}</td>
    <td>{{product.category}}</td>
    <td>{{product.price}}</td>
    <td>{{product.quantity}}</td>
    <!-- <td>{{product.tax}}</td> -->

    <td>
      <a href="/edit-product/{{product.id}}/">Edit</a>
      <a href="/delete-product/{{product.id}}/">Delete</a>
    </td>
  </tr>
  {% endfor %}
</table>

{% endblock %}
